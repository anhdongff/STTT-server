services:
  postgres:
    image: postgres:15-alpine
    container_name: sttt-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sttt-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    # Use the image default command/entrypoint.
    depends_on:
      - postgres

volumes:
  pgdata:
  redis-data:
